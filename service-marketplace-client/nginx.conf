server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    # Compresses JS/CSS/JSON responses — Vite's bundle goes from ~576 KB to ~168 KB
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Hashed static assets (JS/CSS) — cache 1 year ─────────────────────────
    # Vite appends a content hash to every asset filename (e.g. index-BUFaV2wx.js)
    # so it is safe to cache these forever — a new deploy changes the filename.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html — never cache ──────────────────────────────────────────────
    # index.html must always be fresh so the browser picks up new asset filenames.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── React Router — serve index.html for all unknown paths ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
