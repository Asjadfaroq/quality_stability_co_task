name: Deploy Frontend → Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'service-marketplace-client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Node 20 ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: service-marketplace-client/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: service-marketplace-client
        run: npm ci

      # ── 4. Build (production) ─────────────────────────────────────────────────
      # VITE_API_URL is injected at build time so the final JS bundle points to
      # your live Azure App Service URL — not localhost.
      #
      # SETUP: GitHub → Settings → Secrets → Actions → New secret:
      #        VITE_API_URL = https://servicemarket-api.azurewebsites.net/api
      - name: Build
        working-directory: service-marketplace-client
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── 5. Deploy to Azure Static Web Apps ───────────────────────────────────
      # SETUP: Azure Portal → your Static Web App → "Manage deployment token"
      #        Copy the token → add as GitHub secret: AZURE_STATIC_WEB_APPS_API_TOKEN
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # Point directly at the pre-built output — skip the built-in build step
          app_location: 'service-marketplace-client/dist'
          skip_app_build: true
          skip_api_build: true
