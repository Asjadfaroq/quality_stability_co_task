name: Deploy API → Azure App Service

# Runs automatically on every push to main that touches the backend.
# Also runs manually from GitHub → Actions → "Run workflow".
on:
  push:
    branches: [main]
    paths:
      - 'ServiceMarketplace.API/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up .NET 10 ────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 3. Cache NuGet packages ──────────────────────────────────────────────
      # Speeds up subsequent runs — packages are only re-downloaded when
      # the .csproj or lock file changes.
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('ServiceMarketplace.API/**/*.csproj') }}
          restore-keys: nuget-

      # ── 4. Restore ───────────────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore ServiceMarketplace.API/ServiceMarketplace.API.csproj

      # ── 5. Publish ───────────────────────────────────────────────────────────
      - name: Publish (Release)
        run: |
          dotnet publish ServiceMarketplace.API/ServiceMarketplace.API.csproj \
            -c Release \
            -o ./publish \
            --no-restore \
            /p:UseAppHost=false

      # ── 6. Deploy to Azure App Service ──────────────────────────────────────
      # SETUP: In Azure Portal → your App Service → "Get publish profile"
      #        Download the file → copy its contents → add as GitHub secret:
      #        Settings → Secrets → Actions → New secret → AZURE_WEBAPP_PUBLISH_PROFILE
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'servicemarket-api-fkb9dnb0ezd0c6ef'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
